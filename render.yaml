services:
  # ── Backend: NestJS API ──────────────────────────────────────
  - type: web
    name: mbautolab-backend
    runtime: node
    region: frankfurt
    plan: free
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: npm run start:prod
    healthCheckPath: /api/vehicles
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: DATABASE_URL
        fromDatabase:
          name: mbautolab-db
          property: connectionString

  # ── Frontend: Next.js ────────────────────────────────────────
  - type: web
    name: mbautolab-frontend
    runtime: node
    region: frankfurt
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_URL
        fromService:
          name: mbautolab-backend
          type: web
          property: host
          # Will be https://mbautolab-backend.onrender.com

# ── PostgreSQL Database ──────────────────────────────────────
databases:
  - name: mbautolab-db
    region: frankfurt
    plan: free
    databaseName: mbautolab
    user: mbautolab_user
